<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Clicker</title>
    <!-- Подключаем Telegram WebApp, чтобы игра работала внутри мессенджера -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            text-align: center;
            padding-top: 50px;
            margin: 0;
        }
        .balance {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 20px;
        }
        .duck-btn {
            font-size: 100px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        .duck-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="balance">🦆 <span id="score">0</span></div>
    <button class="duck-btn" id="clicker">🦆</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем игру на весь экран Telegram

        let score = parseInt(localStorage.getItem('duck_score')) || 0;
        document.getElementById('score').innerText = score;

        const clickerBtn = document.getElementById('clicker');
        clickerBtn.addEventListener('click', () => {
            score++;
            document.getElementById('score').innerText = score;
            localStorage.setItem('duck_score', score);
        });
    </script>
</body>
</html>
